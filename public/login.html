<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Retriev</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080a0f;
      --primary: #6366f1;
      --accent: #8b5cf6;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --radius: 14px;
      --radius-sm: 8px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(139,92,246,0.1) 0%, transparent 60%);
    }
    .auth-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: rgba(13,17,23,0.9);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
    }
    .auth-logo {
      text-align: center; margin-bottom: 32px;
      font-size: 26px; font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
    .auth-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; text-align: center; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: rgba(255,255,255,0.8); }
    input[type=email], input[type=password] {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      color: var(--text); font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    input[type=email]::placeholder, input[type=password]::placeholder { color: var(--text-muted); }
    input[type=email]:focus, input[type=password]:focus { border-color: var(--primary); }

    .form-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
    .forgot { font-size: 13px; color: var(--primary); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .btn-auth {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity .2s, transform .2s; margin-bottom: 20px;
    }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); }

    .divider {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--card-border);
    }
    .divider span { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    .btn-social {
      width: 100%; padding: 13px;
      background: var(--card-bg); border: 1px solid var(--card-border);
      color: var(--text); border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 12px;
    }
    .btn-social:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }

    .auth-footer { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 24px; }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="auth-card">
  <div class="auth-logo">Retriev</div>
  <div class="auth-title">Welcome back</div>
  <div class="auth-sub">Sign in to your Retriev account</div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@company.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>
    <div class="form-row">
      <label class="remember">
        <input type="checkbox" style="accent-color:var(--primary)"> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button type="submit" class="btn-auth">Sign In →</button>
  </form>

  <div class="divider"><span>or continue with</span></div>

  <button class="btn-social">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <button class="btn-social">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    Continue with GitHub
  </button>

  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Sign up free</a>
  </div>
</div>

<script>
const API_URL = 'https://retriev-api.garytuohy.workers.dev/api';

async function handleLogin(e) {
  e.preventDefault();
  
  const btn = document.querySelector('.btn-auth');
  const originalText = btn.textContent;
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  
  try {
    const res = await fetch(`${API_URL}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      if (data.token) {
        localStorage.setItem('retriev_token', data.token);
      }
      localStorage.setItem('retriev_user', JSON.stringify(data.user));
      // Redirect based on onboarding status
      if (data.user.plan === 'trial' && !data.user.onboardingComplete) {
        window.location.href = 'onboarding.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    } else {
      alert(data.error || 'Login failed. Please try again.');
      btn.textContent = originalText;
      btn.disabled = false;
    }
  } catch (err) {
    alert('Network error. Please try again.');
    btn.textContent = originalText;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
