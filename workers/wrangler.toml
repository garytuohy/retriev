name = "retriev-api"
main = "api/router.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare AI binding
[ai]
binding = "AI"

# KV Namespace bindings
# Create with: wrangler kv:namespace create "RETRIEV_KV"
# Then paste the id here
[[kv_namespaces]]
binding = "KV"
id = "7e13677197044afaba82b14f5c9b5eb7"

# Environment variables (secrets set via wrangler secret put)
# STRIPE_WEBHOOK_SECRET
# STRIPE_SECRET_KEY
# RESEND_API_KEY
# SESSION_SECRET

[vars]
ENVIRONMENT = "production"
APP_URL = "https://retriev.pages.dev"

# Dunning scheduler — runs daily at 9am UTC
[triggers]
crons = ["0 9 * * *"]


